name: Bug report
description: Report a defect in AMR Sentinel
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so the maintainers can reproduce and fix the issue.

        **Before filing**: please search [existing issues](https://github.com/Tej-Katika/amr-sentinel/issues) to confirm this hasn't already been reported.

        **Security vulnerabilities**: do NOT file a public issue. See [SECURITY.md](https://github.com/Tej-Katika/amr-sentinel/blob/main/SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
      placeholder: "When I do X, Y happens but Z is expected."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal sequence of steps that reliably triggers the bug. Include commands, configuration, and any relevant payload.
      placeholder: |
        1. Run `docker compose up -d`
        2. Apply `scripts/setup_timescaledb.sh`
        3. POST to `/api/ingest/...` with payload below
        4. Observe error in `services/ingestion` logs
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, log output, and stack traces in fenced code blocks.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of AMR Sentinel is affected?
      multiple: true
      options:
        - services/ingestion
        - services/intelligence
        - services/agentic
        - services/gateway
        - frontend
        - scripts
        - docker-compose / infrastructure
        - documentation
        - other (describe in summary)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD`, or release tag, or "main" if on the tip.
      placeholder: "e.g., abc1234 or v0.1.0"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Docker version, Python version, etc.
      placeholder: "macOS 14.5, Docker Desktop 4.30, Python 3.12.4"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, suspected root cause, attempted workarounds.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow the project [Code of Conduct](https://github.com/Tej-Katika/amr-sentinel/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
